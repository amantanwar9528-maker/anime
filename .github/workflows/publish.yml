name: Post anime Short

# Runs 6 times a day -> 6 Shorts/day, fully hands-off (your PC stays off).
# GitHub cron is in UTC. India Standard Time = UTC + 5:30. Times below are IST:
#   6:00 AM  IST = 00:30 UTC
#   10:00 AM IST = 04:30 UTC
#   1:00 PM  IST = 07:30 UTC
#   5:00 PM  IST = 11:30 UTC
#   8:00 PM  IST = 14:30 UTC
#   11:00 PM IST = 17:30 UTC
# (Free runners can start 5-15 min late under load — that's normal.)
on:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 4 * * *"
    - cron: "30 7 * * *"
    - cron: "30 11 * * *"
    - cron: "30 14 * * *"
    - cron: "30 17 * * *"
  workflow_dispatch:        # press "Run workflow" to make one any time

permissions:
  contents: write           # needed to commit the state file back

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-noto-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore YouTube OAuth from GitHub Secrets
        env:
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python scripts/bootstrap_secrets.py

      - name: Make + upload one Short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m src.main

      - name: Save state so nothing repeats and music continues in order
        run: |
          git config user.name "anime-bot"
          git config user.email "anime-bot@users.noreply.github.com"
          git add -f data/state/state.json || true
          git commit -m "chore: update state [skip ci]" || echo "nothing to commit"
          git push || echo "push skipped"

      - name: Save the video + logs for your review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-output
          path: |
            data/output/**/short.mp4
            data/output/**/script.json
            data/output/**/result.json
            data/logs/**
          retention-days: 7
          if-no-files-found: ignore
