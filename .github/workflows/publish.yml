name: Post anime Short

# Runs TWICE a day -> 2 Shorts/day, fully hands-off.
# GitHub cron is in UTC. These two times are good global Shorts slots.
# (Free runners can start 5-15 min late under load — that's normal.)
#   08:30 UTC  (= 2:00 PM IST)
#   15:30 UTC  (= 9:00 PM IST)
on:
  schedule:
    - cron: "30 8 * * *"
    - cron: "30 15 * * *"
  workflow_dispatch:        # lets you press "Run workflow" manually any time

permissions:
  contents: read

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  make-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ffmpeg fonts-dejavu fonts-noto-core

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore YouTube OAuth from GitHub Secrets
        env:
          YT_CLIENT_SECRET_JSON: ${{ secrets.YT_CLIENT_SECRET_JSON }}
          YT_TOKEN_JSON: ${{ secrets.YT_TOKEN_JSON }}
        run: python scripts/bootstrap_secrets.py

      - name: Make + upload one Short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m src.main

      - name: Save the video + logs for your review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-output
          path: |
            data/output/**/short.mp4
            data/output/**/script.json
            data/output/**/result.json
            data/logs/**
          retention-days: 7
          if-no-files-found: ignore
